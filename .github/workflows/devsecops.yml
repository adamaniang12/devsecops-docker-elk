name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # JOB 1 : SAST
    - name: SAST with Semgrep
      run: docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep semgrep --config=auto

    # JOB 2 : Build de l'image sécurisée
    - name: Build Secure Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/secure-app:latest ./app

    # JOB 3 : Scan Trivy (Bloque si CRITICAL)
    - name: Vulnerability Scan with Trivy
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image --exit-code 1 --severity CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/secure-app:latest

    # JOB 5 : Publication DockerHub (Après login)
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to DockerHub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/secure-app:latest